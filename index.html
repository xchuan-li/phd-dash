<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>Xiaochuan Li OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Crimson+Pro:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf7; --panel:#ffffff; --panel-2:#f3f3ee; --ink:#1a1a1a; --ink-soft:#6b6b6b;
  --line:rgba(0,0,0,.10); --line-soft:rgba(0,0,0,.055); --accent:#b8350f; --accent-soft:#f6ece7;
  --teal:#1d9e75; --amber:#ba7517; --red:#9f1127; --green:#1d9e75;
  --shadow:0 1px 2px rgba(20,20,20,.03),0 4px 18px rgba(20,20,20,.05);
  --radius:12px; --radius-sm:8px;
  --font:"Inter","PingFang SC","Microsoft YaHei","Noto Sans CJK SC",system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --serif:"Crimson Pro",Georgia,serif;
}
html[data-theme="dark"]{
  --bg:#16140f; --panel:#211e18; --panel-2:#2a261f; --ink:#f0ece3; --ink-soft:#a39c8f;
  --line:rgba(255,255,255,.10); --line-soft:rgba(255,255,255,.05); --accent:#e8693f; --accent-soft:#3a241b;
  --teal:#3fbd92; --amber:#d99a3c; --red:#e06a5a; --green:#3fbd92;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.62;
  font-family:var(--font); font-feature-settings:"ss01","cv11";
  -webkit-font-smoothing:antialiased; padding-bottom:40px;
}
a{color:var(--accent);text-decoration:none}
.wrap{max-width:1040px;margin:0 auto;padding:0 18px}

/* top bar */
header.top{position:sticky;top:0;z-index:30;backdrop-filter:saturate(160%) blur(12px);
  background:color-mix(in srgb,var(--bg) 82%,transparent);border-bottom:1px solid var(--line)}
.top-in{display:flex;align-items:center;gap:14px;padding:12px 0}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:.2px}
.brand .logo{width:28px;height:28px;flex:none;display:block;overflow:visible}
.top-spacer{flex:1}
.kpi{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);
  background:var(--panel);border:1px solid var(--line);padding:6px 11px;border-radius:999px}
.kpi b{color:var(--ink)}
.ring{width:38px;height:38px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
  color:var(--ink);cursor:pointer;font-size:16px;display:grid;place-items:center}
.icon-btn:hover{border-color:var(--accent)}

/* tabs */
nav.tabs{position:sticky;top:57px;z-index:20;background:var(--bg);border-bottom:1px solid var(--line)}
.tabs-in{display:flex;gap:22px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.tab{white-space:nowrap;padding:13px 1px;border:none;background:none;position:relative;
  color:var(--ink-soft);cursor:pointer;font-weight:500;font-size:13.5px;letter-spacing:.01em}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink)}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--accent)}

main{padding-top:20px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px}
.section-title{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-soft);margin:26px 2px 12px}
/* mono micro-labels — site design language */
.section-title,.task .label,.lab-row .k,.tnum,.kpi,.gantt-head span,.cklabel,.tlog-d,
.tscore-l,.tscore b,.wd-d,.gcat,.gthead,.daynav .muted{font-family:var(--mono)}
.grid{display:grid;gap:14px}
.muted{color:var(--ink-soft)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
.tag.teal{background:color-mix(in srgb,var(--teal) 16%,transparent);color:var(--teal)}
.tag.amber{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.tag.red{background:color-mix(in srgb,var(--red) 16%,transparent);color:var(--red)}
.tag.gray{background:var(--line-soft);color:var(--ink-soft)}
.pill-flag{font-size:13px}

/* ---- TODAY ---- */
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
@media(max-width:760px){.hero{grid-template-columns:1fr}.top .kpi.hide-sm{display:none}}
.hero .date-big{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:2px 0 2px}
.hero .sub{color:var(--ink-soft);font-size:14px}
.phase-badge{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:8px 14px;
  border-radius:12px;font-weight:700;background:var(--accent-soft);color:var(--accent);font-size:14px}
.phase-badge .dot{width:9px;height:9px;border-radius:50%;background:currentColor}
.countdown{display:flex;flex-direction:column;justify-content:center}
.countdown .n{font-size:34px;font-weight:800;line-height:1.1}
.countdown small{color:var(--ink-soft)}
.task{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line-soft)}
.task:first-of-type{border-top:none}
.chk{appearance:none;-webkit-appearance:none;flex:none;width:24px;height:24px;border-radius:8px;
  border:2px solid var(--line);background:var(--panel);cursor:pointer;margin-top:2px;position:relative;transition:.15s}
.chk:hover{border-color:var(--accent)}
.chk:checked{background:var(--accent);border-color:var(--accent)}
.chk:checked::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:800}
.task .body{flex:1;min-width:0}
.task .label{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft)}
.task .txt{font-size:15.5px;font-weight:600;margin-top:1px}
.task.done .txt{text-decoration:line-through;color:var(--ink-soft)}
.task .extra{font-size:13.5px;color:var(--ink-soft);margin-top:4px}
.reslink{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:12.5px;font-weight:600;
  color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:8px;text-decoration:none}
.reslink:hover{filter:brightness(.96);text-decoration:underline}
.row .reslink{margin-top:5px;margin-left:0;padding:2px 8px;font-size:11.5px}
.deliv{font-size:11.5px;color:var(--ink-soft);margin-top:7px;padding-left:9px;
  border-left:2px solid color-mix(in srgb,var(--accent) 35%,transparent)}
.task.done .deliv{opacity:.5}
/* 子任务 subtasks */
.subs{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.subtask{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;
  background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 12px 4px 8px;cursor:pointer}
.subtask:hover{border-color:var(--accent)}
.subtask.done{color:var(--ink-soft);text-decoration:line-through;opacity:.7}
.chk-sm{width:17px;height:17px;border-radius:6px;margin-top:0}
.chk-sm:checked::after{font-size:11px}
.rsubs{display:inline-flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;flex:none;max-width:48%}
.rsub{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--ink-soft);
  background:var(--panel);border:1px solid var(--line-soft);border-radius:999px;padding:2px 7px 2px 5px;cursor:pointer;white-space:nowrap}
.rsub.done{text-decoration:line-through;opacity:.65}
.rsub i{font-style:normal}
/* 技术轨 tracks */
.trk-card{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.trk-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px}
.trk-name{font-weight:800;font-size:15px}
.trk-body{display:flex;flex-direction:column;gap:2px}
.trk-line{display:flex;align-items:flex-start;gap:9px;padding:7px 0;cursor:pointer;border-top:1px solid var(--line-soft)}
.trk-line .chk-sm{margin-top:1px}
.trk-tw{display:flex;flex-direction:column;gap:1px;min-width:0}
.trk-d{font-size:11.5px;color:var(--ink-soft);font-weight:400;line-height:1.35}
.trk-line:first-child{border-top:none}
.trk-no{font-variant-numeric:tabular-nums;color:var(--ink-soft);font-size:12.5px;font-weight:700;min-width:36px}
.trk-t{font-size:14px}
.trk-line.done .trk-t{text-decoration:line-through;color:var(--ink-soft)}
/* 想法收集箱 ideas */
.idea-add{display:flex;gap:8px;margin-bottom:14px;align-items:flex-start}
.idea-in{flex:1;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:14px;background:var(--panel);color:inherit}
.idea-btn{flex:none;padding:9px 18px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:14px}
.idea-list{display:flex;flex-direction:column;gap:10px}
.idea-card{position:relative;background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:11px 14px}
.idea-date{font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums;margin-bottom:4px}
.idea-text{font-size:14.5px;white-space:pre-wrap;word-break:break-word;padding-right:20px}
.idea-ttl{font-weight:700;font-size:15px;margin-bottom:3px;padding-right:20px}
.idea-title-in{width:100%;font-weight:600;box-sizing:border-box}
.idea-add-wrap{margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
.idea-add-wrap .idea-add{margin-bottom:0}
.idea-x{position:absolute;top:8px;right:10px;border:none;background:none;color:var(--ink-soft);font-size:18px;line-height:1;cursor:pointer;padding:0}
.idea-x:hover{color:var(--red)}
/* 项目甘特图 gantt */
.gt-add{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.gt-in{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font:inherit;font-size:13px;background:var(--panel);color:inherit}
.gt-text{flex:1;min-width:150px}
.gt-chart{border:1px solid var(--line-soft);border-radius:12px;overflow-x:auto;background:var(--panel)}
.gt-head,.gt-row{display:flex;align-items:stretch;min-width:660px}
.gt-label{flex:none;width:112px;padding:9px 10px;font-size:13px;font-weight:700;display:flex;align-items:center}
.gt-track{position:relative;flex:1;display:flex;min-height:42px}
.gt-head .gt-track{min-height:26px}
.gt-mon{flex:none;font-size:10px;color:var(--ink-soft);border-left:1px solid var(--line-soft);padding:5px 0 0 4px}
.gt-cell{flex:none;border-left:1px solid var(--line-soft)}
.gt-row{border-top:1px solid var(--line-soft)}
.gt-bar{position:absolute;top:9px;height:24px;border-radius:6px;display:flex;align-items:center;gap:4px;padding:0 4px 0 7px;color:#fff;font-size:11.5px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.gt-bar span{overflow:hidden;text-overflow:ellipsis;max-width:200px}
.gt-x{border:none;background:rgba(255,255,255,.28);color:#fff;border-radius:50%;width:15px;height:15px;line-height:15px;text-align:center;font-size:12px;cursor:pointer;flex:none;padding:0}
.scorecard{display:flex;flex-direction:column;gap:11px}
.sc-row{display:flex;align-items:center;gap:10px;font-size:13px}
.sc-l{flex:none;width:92px;color:var(--ink-soft);font-weight:600}
.sc-bar{flex:1;height:7px;border-radius:4px;background:var(--line);overflow:hidden}
.sc-bar i{display:block;height:100%;border-radius:4px;transition:width .25s ease}
.sc-row b{flex:none;width:52px;text-align:right;font-family:var(--mono);font-size:12.5px}
.sc-note{font-size:12px;color:var(--ink-soft);line-height:1.55;margin-top:2px;padding-top:10px;border-top:1px solid var(--line-soft)}
.daynav{display:flex;align-items:center;gap:8px}
.daynav button{border:1px solid var(--line);background:var(--panel);color:var(--ink);
  border-radius:9px;padding:6px 12px;cursor:pointer;font-weight:600}
.daynav button:hover{border-color:var(--accent)}
.banner{padding:10px 14px;border-radius:12px;background:var(--amber);color:#fff;font-weight:600;margin-bottom:14px}

/* week strip */
.weekstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:6px}
@media(max-width:560px){.weekstrip{grid-template-columns:repeat(4,1fr)}}
.wd{border:1px solid var(--line);border-radius:12px;padding:9px 8px;cursor:pointer;background:var(--panel-2);min-width:0}
.wd:hover{border-color:var(--accent)}
.wd.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.wd .wd-d{font-size:12px;color:var(--ink-soft);font-weight:600}
.wd .wd-t{font-size:12.5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wd .wd-bar{height:4px;border-radius:3px;background:var(--line);margin-top:7px;overflow:hidden}
.wd .wd-bar i{display:block;height:100%;background:var(--green);width:0}

/* ---- PHASE BAR ---- */
.phasebar{display:flex;height:34px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.phaseseg{position:relative;min-width:3px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:700;overflow:hidden;white-space:nowrap;cursor:default}
.phaseseg.cur{outline:2px solid var(--ink);outline-offset:-2px}
.phaselegend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;font-size:12.5px}
.phaselegend span{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft)}
.phaselegend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* ---- WEEK ACCORDION (plan) ---- */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.input{flex:1;min-width:180px;border:1px solid var(--line);background:var(--panel);color:var(--ink);
  border-radius:10px;padding:9px 13px;font-size:14px}
.input::placeholder{color:var(--ink-soft)}
.chipset{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);border-radius:999px;
  padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.week{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);margin-bottom:10px;overflow:hidden}
.week-h{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
.week-h:hover{background:var(--panel-2)}
.week-h .w-title{font-weight:700}
.week-h .w-sub{color:var(--ink-soft);font-size:13px}
.week-h .w-prog{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft)}
.mini-bar{width:64px;height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.mini-bar i{display:block;height:100%;background:var(--green)}
.week-body{display:none;border-top:1px solid var(--line-soft)}
.week.open .week-body{display:block}
.row{display:flex;gap:12px;align-items:flex-start;padding:11px 16px;border-top:1px solid var(--line-soft)}
.row:first-child{border-top:none}
.row.is-today{background:var(--accent-soft)}
.row.rest{opacity:.72}
.row .rdate{flex:none;width:52px;font-weight:700;font-size:13px;color:var(--ink-soft);padding-top:2px}
.row .rmain{flex:1;min-width:0}
.row .rline{display:flex;gap:10px;align-items:flex-start;margin-top:9px}
.row .rline:first-child{margin-top:0}
.row .rlabel{flex:none;width:30px;font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.03em;padding-top:2px}
.row .rtext{flex:1;font-size:14.5px;font-weight:500;min-width:0;line-height:1.5}
.row .rline.done .rtext{text-decoration:line-through;text-decoration-color:var(--ink-soft);color:var(--ink-soft)}
.row .rline.done .rtext a,.row .rline.done .rtext b{text-decoration:line-through}
.rchk-box{flex:none;margin-top:1px}
.rchk-spacer{flex:none;width:20px}
.row .chk{width:20px;height:20px;border-radius:6px}
.row .chk:checked::after{font-size:12px}
.cklabel{font-size:9px;color:var(--ink-soft);font-weight:700}

/* ---- TIMELINE ---- */
.dl{display:flex;gap:14px;padding:14px 0;border-top:1px solid var(--line-soft);align-items:flex-start}
.dl:first-child{border-top:none}
.dl .when{flex:none;width:96px;text-align:right}
.dl .when .d{font-weight:800}
.dl .when .cd{font-size:12px;color:var(--ink-soft)}
.dl .marker{flex:none;width:14px;height:14px;border-radius:50%;margin-top:4px;border:3px solid var(--panel);
  box-shadow:0 0 0 2px var(--accent)}
.dl.critical .marker{box-shadow:0 0 0 2px var(--red)}
.dl.star .marker{box-shadow:0 0 0 2px var(--teal);background:var(--teal)}
.dl.star .what .t{color:var(--teal)}
.dl.past{opacity:.5}
.dl .what{flex:1}
.dl .what .t{font-weight:700}
.dl .what .m{font-size:13px;color:var(--ink-soft);margin-top:2px}

/* ---- LABS ---- */
.lab{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:16px;box-shadow:var(--shadow)}
.lab-h{display:flex;align-items:flex-start;gap:10px}
.tierbadge{flex:none;font-weight:800;font-size:13px;color:#fff;border-radius:9px;padding:5px 9px;min-width:42px;text-align:center}
.lab-h .name{font-weight:800;font-size:16px;line-height:1.35}
.lab-h .inst{font-size:13px;color:var(--ink-soft);margin-top:2px}
.lab-row{margin-top:11px;font-size:13.5px}
.lab-row .k{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:3px}
.lab-note{margin-top:11px;padding:11px 13px;border-radius:11px;background:var(--accent-soft);
  color:var(--ink);font-size:13.5px;line-height:1.55}
.lab-note b{color:var(--accent)}
.dl-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.labgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
@media(max-width:560px){.labgrid{grid-template-columns:1fr}}

/* ---- TARGETS (申请目标) ---- */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:14px}
@media(max-width:560px){.tgrid{grid-template-columns:1fr}}
.tcard{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px}
.tcard-h{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.tcard-name{font-weight:800;font-size:15.5px;line-height:1.35}
.tcard-inst{font-size:13px;color:var(--ink-soft);margin-top:2px}
.tcard-scores{display:flex;flex-direction:column;gap:4px;flex:none}
.tscore{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft)}
.tscore-l{width:26px}
.tscore-bar{width:56px;height:5px;border-radius:3px;background:var(--line);overflow:hidden}
.tscore-bar i{display:block;height:100%}
.tscore b{color:var(--ink);font-size:11.5px;width:20px;text-align:right}
.tcard .lab-row{margin-top:9px}
.tlegend{margin-bottom:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:2px 14px}
.tlegend summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);padding:9px 0;list-style:none}
.tlegend summary::-webkit-details-marker{display:none}
.tlegend summary::before{content:"▸ ";color:var(--accent)}
.tlegend[open] summary::before{content:"▾ "}
.tlegend-h{font-weight:700;margin:10px 0 2px;font-size:13.5px}
.tnum{display:inline-block;font-size:11px;font-weight:800;color:var(--ink-soft);background:var(--line-soft);
  border-radius:6px;padding:1px 6px;margin-right:2px;vertical-align:1px}
.tstatus-row{display:flex;align-items:center;gap:10px;margin-top:11px}
.tstatus-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:999px}
.tstatus-pill .dot{width:7px;height:7px;border-radius:50%}
.tstatus-sel,.tsort{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;
  padding:6px 10px;font-size:13px;font-weight:600;cursor:pointer}
.tstatus-sel{padding:4px 8px;font-size:12px}
.tlog{margin-top:11px;border-top:1px solid var(--line-soft);padding-top:4px}
.tlog summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--accent);padding:6px 0;list-style:none}
.tlog summary::-webkit-details-marker{display:none}
.tlog summary::before{content:"▸ "}.tlog[open] summary::before{content:"▾ "}
.tlog-e{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-top:1px solid var(--line-soft);font-size:13px}
.tlog-e:first-child{border-top:none}
.tlog-d{flex:none;font-weight:700;color:var(--ink-soft);font-size:11.5px;padding-top:1px;width:62px}
.tlog-t{flex:1;min-width:0;word-break:break-word}
.tlog-x{flex:none;border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:15px;line-height:1;padding:0 2px}
.tlog-x:hover{color:var(--red)}
.tlog-add{display:flex;gap:6px;margin-top:8px}
.tlog-in{flex:1;font-size:13px;padding:7px 10px}
.tlog-btn{flex:none;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;padding:0 14px;font-weight:600;cursor:pointer}
.tlog-btn:hover{filter:brightness(1.05)}

/* ---- GANTT ---- */
.gantt{--glabel:120px;position:relative;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--panel);overflow-x:auto;box-shadow:var(--shadow)}
.gantt-head,.gantt-row{display:grid;grid-template-columns:var(--glabel) repeat(11,minmax(36px,1fr));align-items:center;min-width:620px}
.gantt-head{position:sticky;top:57px;background:var(--panel-2);border-bottom:1px solid var(--line);z-index:3}
.gantt-head span{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding:9px 0}
.gantt-head span small{display:block;font-size:8.5px;opacity:.7}
.gantt-label{grid-column:1;padding:7px 10px;font-size:11.5px;line-height:1.3;position:sticky;left:0;
  background:var(--panel);z-index:2;border-right:1px solid var(--line)}
.gantt-head .gantt-label{background:var(--panel-2);font-weight:700;color:var(--ink-soft)}
.gantt-label b{font-weight:700;display:inline}
.gantt-label .muted{display:block;font-size:10.5px;margin-top:1px}
.gantt-body{position:relative}
.gantt-row{min-height:40px;border-top:1px solid var(--line-soft)}
.gbar{align-self:center;height:21px;border-radius:6px;display:flex;align-items:center;padding:0 8px;color:#fff;
  font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.18);z-index:1}
.gbar.groll{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.16) 0 6px,transparent 6px 13px)}
.gddl-m{align-self:center;text-align:center;color:var(--red);font-size:14px;font-weight:800;z-index:2;margin-left:-6px}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);opacity:.6;z-index:2;pointer-events:none}
.gantt-today::before{content:"今天";position:absolute;top:1px;left:3px;font-size:9px;font-weight:800;color:var(--accent);white-space:nowrap}
.tcard-name a.tlink{color:inherit;text-decoration:none;border-bottom:1.5px solid color-mix(in srgb,var(--accent) 45%,transparent)}
.tcard-name a.tlink:hover{color:var(--accent);border-bottom-color:var(--accent)}
.gcat{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-right:3px;vertical-align:1px}
.gtable{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.gtrow{display:grid;grid-template-columns:84px 1fr 108px 108px 34px;gap:7px;align-items:center;padding:7px 10px;border-top:1px solid var(--line-soft)}
.gtrow:first-child{border-top:none}
.gtrow.gthead{font-size:11px;font-weight:700;color:var(--ink-soft);background:var(--panel-2);text-transform:uppercase;letter-spacing:.04em}
.gt-f{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:6px 8px;font-size:12.5px;min-width:0;width:100%}
.gt-f.input{font-weight:600}
.gt-del{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:17px;line-height:1}
.gt-del:hover{color:var(--red)}
@media(max-width:560px){.gtrow{grid-template-columns:70px 1fr 84px 84px 28px;gap:5px;padding:7px 8px}.gt-f{padding:5px 5px;font-size:11.5px}}

footer{margin-top:40px;padding:20px 0;border-top:1px solid var(--line);color:var(--ink-soft);font-size:12.5px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center}
footer .top-spacer{flex:1}
footer button{border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);border-radius:8px;
  padding:6px 11px;cursor:pointer;font-size:12.5px}
footer button:hover{border-color:var(--red);color:var(--red)}
</style>
</head>

const pad = n=>String(n).padStart(2,'0');
function isoToday(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/864e5); }
function fmtCN(iso){ const d=parseISO(iso); const w='日一二三四五六'[d.getDay()];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 周${w}`; }
function clampIso(iso){ if(iso<DATA.planStart) return DATA.planStart; if(iso>DATA.planEnd) return DATA.planEnd; return iso; }

function tget(pi){ const d=tstore[pi]||{}; return {status:d.status||'none', log:Array.isArray(d.log)?d.log:[]}; }

/* tasks of a day -> list of {type,label,txt,extra,key,badge} */
function isRest(eng){ return /^休息|恢复\s*\/\s*不安排/.test(eng); }
function dayTasks(day){
  const out=[]; const eng=day.engineering||'';
  if(eng){
    const parts = eng.split('｜').map(s=>s.trim());
    out.push({type:'eng',label:'今日学习', txt:parts[0], extra:parts.slice(1).join('  ·  '),
      ref:(day.engRef||''), kb:(day.kb||[]), key:day.iso+'#eng', skip:isRest(eng)});
  }
  if(day.codeex){ out.push({type:'code',label:'代码练习 · Codeex', txt:day.codeex, level:(day.codeexLevel||0), key:day.iso+'#code', suggested:!!day.codeexSuggested}); }
  const p=(day.paper||'').trim();
  if(p && p!=='—' && p!=='-'){
    const deep=/【精读\+复现】/.test(p);
    out.push({type:'paper',label:'论文精读', txt:p.replace('【精读+复现】','').trim(),
      extra:'', badge:deep?'精读+复现':'阅读', tags:(day.paperTags||[]), key:day.iso+'#paper'});
  }
  return out;
}
const SUBTASKS={
  eng:  [{id:'note',label:'读书笔记'},{id:'kb',label:'整理到 KB'}],
  code: [{id:'code',label:'完成代码'},{id:'write',label:'完整写代码到 Obsidian'},{id:'kb',label:'整理知识点到 KB'}],
  paper:[{id:'note',label:'论文笔记'},{id:'kb',label:'整理到 KB'}],
};
function subsOf(t){ return (t&&!t.skip)?(SUBTASKS[t.type]||[]).map(s=>({id:s.id,label:s.label,key:t.key+'#'+s.id})):[]; }
function taskDone(t){ const s=subsOf(t); return s.length? s.every(x=>isDone(x.key)) : isDone(t.key); }
function daySubs(day){ return dayTasks(day).filter(x=>!x.skip).flatMap(subsOf); }
function dayProgress(day){ const t=daySubs(day);
  if(!t.length) return 1; let d=0; t.forEach(x=>{ if(isDone(x.key))d++; }); return d/t.length; }
/* deliverable per task type — "打勾 = 交付一个可验证产物" */
function deliverableFor(t){
  if(t.type==='eng')  return '交付：能跑通 / 通过测试的代码 + commit';
  if(t.type==='code') return '交付：做完 starter 的 TODO + 思考题 + commit';
  if(t.type==='paper')return t.badge==='精读+复现' ? '交付：复现核心图/表 + 结构化笔记' : '交付：一段结构化笔记（问题/方法/结果/一条批评/与 SNG 的关系）';
  return '';
}
/* quantified progress per track (done / total across the whole plan) */
function trackStats(){
  const s={eng:{d:0,t:0,label:'学习',c:'var(--teal)'},
           paper:{d:0,t:0,label:'论文笔记',c:'var(--amber)'},
           code:{d:0,t:0,label:'Codeex 代码',c:'#5d3b8c'}};
  DATA.daily.forEach(day=>dayTasks(day).filter(x=>!x.skip).forEach(x=>{
    const tr=s[x.type]; if(!tr) return; subsOf(x).forEach(su=>{ tr.t++; if(isDone(su.key)) tr.d++; }); }));
  return s;
}
function scorecardHTML(){
  const s=trackStats();
  const row=k=>{ const r=s[k]; const pct=r.t?Math.round(r.d/r.t*100):0;
    return `<div class="sc-row"><span class="sc-l">${r.label}</span>
      <span class="sc-bar"><i style="width:${pct}%;background:${r.c}"></i></span><b>${r.d}/${r.t}</b></div>`; };
  return `${row('eng')}${row('paper')}${row('code')}
    <div class="sc-note">每打勾 = 交付一个可验证产物。<b>公开 + 带日期</b>（每日 git commit、公开笔记、arXiv）才算数——既防糊弄，又自动变成申请材料。</div>`;
}

let PHASES=null;
function computePhases(){
  if(PHASES) return PHASES;
  const arr=[]; let last=null;
  DATA.daily.forEach(day=>{
    // explicit per-day phase (set by month) wins — keyword matching mislabels
    // cross-month topics that happen to share words like "interp"/"因果".
    if(day.phase){ const f={name:day.phase, c:day.phaseC||'#777'}; last=f; arr.push(f); return; }
    // match only the PRIMARY task (text before the first colon) to avoid
    // stray mentions like "PyTorch…与numpy互转" or "复盘 ｜ PhD技能: 面试"
    const head=(day.engineering||'').split(/[:：]/)[0];
    let found=null;
    for(const d of PHASE_DEFS){ if(d.re.test(head)){ found=d; break; } }
    if(!found) found = last || PHASE_DEFS[0];   // interlude/unknown -> carry forward
    last=found; arr.push(found);
  });
  // absorb 1-day slivers into the previous segment for a cleaner phase bar
  for(let i=1;i<arr.length;i++){
    if(arr[i].name!==arr[i-1].name && (i+1>=arr.length || arr[i+1].name!==arr[i].name)) arr[i]=arr[i-1];
  }
  PHASES=arr; return arr;
}
function phaseOf(iso){ const i=DATA.daily.findIndex(d=>d.iso===iso); return i<0?null:computePhases()[i]; }
function phaseSegments(){
  const ph=computePhases(); const segs=[]; let cur=null;
  ph.forEach((p,i)=>{ if(!cur||cur.name!==p.name){ cur={name:p.name,c:p.c,start:i,count:0}; segs.push(cur);} cur.count++; });
  return segs;
}

function mondayOf(d){ const x=new Date(d); x.setDate(d.getDate()-((d.getDay()+6)%7)); return x; }
function weekOf(iso){
  const d=parseISO(iso); const start=mondayOf(d);
  const days=[]; for(let i=0;i<7;i++){ const x=new Date(start); x.setDate(start.getDate()+i);
    const xi=`${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;
    const found=DATA.daily.find(z=>z.iso===xi); if(found) days.push(found); }
  // number weeks from the Monday of the plan's first week (Mon-aligned, consistent everywhere)
  const pMon=mondayOf(parseISO(DATA.planStart));
  const num=Math.floor(Math.round((start-pMon)/864e5)/7)+1;
  return {days,num};
}
function nextDeadline(real){
  const up=(DATA.deadlines||[]).filter(x=>x.date>=real).sort((a,b)=>a.date.localeCompare(b.date))[0];
  if(!up) return null; return {...up, days:daysBetween(real,up.date)};
}

      <div class="idea-add"><textarea id="ideaIn" class="idea-in" rows="2" placeholder="正文…（Cmd/Ctrl+Enter 添加）"></textarea><button class="idea-btn" id="ideaAdd">添加</button></div>
    </div>
    <div class="idea-list">${cards}</div>`;
  const add=()=>{ const ti=$('#ideaTitle').value.trim(), t=$('#ideaIn').value.trim(); if(!ti&&!t)return; const a=loadIdeas(); a.push({id:'i'+Date.now()+Math.floor(Math.random()*1000),title:ti,text:t,ts:Date.now()}); saveIdeas(a); renderIdeas(); };
  $('#ideaAdd').onclick=add;
  $('#ideaIn').onkeydown=e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='Enter') add(); };
  $('#ideaTitle').onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#ideaIn').focus(); } };
  $$('#view-ideas .idea-x').forEach(x=>x.onclick=()=>{ saveIdeas(loadIdeas().filter(i=>i.id!==x.dataset.id)); renderIdeas(); });
}
function renderFunding(){
  const F=DATA.funding||{};
  const fitColor=v=> v>=4.5?'var(--green)': v>=3.5?'var(--teal)': v>=2.5?'var(--amber)':'var(--red)';
  const trend=(F.trend||[]).map(x=>`<div class="card" style="margin-bottom:8px"><div style="font-weight:700;margin-bottom:3px">${esc(x.h)}</div><div class="muted" style="font-size:13px;line-height:1.55">${esc(x.t)}</div></div>`).join('');
  const groups=(F.groups||[]).map(g=>{
    const rows=(g.items||[]).map(it=>{ const fc=fitColor(it.fit);
      return `<div class="lab-row" style="align-items:flex-start;gap:8px">
        <div style="min-width:150px;flex:none">
          <div style="font-weight:600;font-size:13px">${esc(it.n)}</div>
          <div class="muted" style="font-size:11.5px">${esc(it.who||'')}${it.amt?` · ${esc(it.amt)}`:''}</div>
        </div>
        <div style="flex:1;min-width:0">
          <span class="tag" style="background:${fc}1f;color:${fc};font-weight:700">契合 ${it.fit}</span>
          ${it.stat?`<span class="tag gray" style="margin-left:4px">${esc(it.stat)}</span>`:''}
          <div class="muted" style="font-size:12.5px;line-height:1.5;margin-top:3px">${esc(it.note||'')}</div>
        </div></div>`; }).join('');
    return `<div class="section-title">${esc(g.g)}</div><div class="card" style="margin-bottom:12px">${rows}</div>`;
  }).join('');
  $('#view-funding').innerHTML=`
    <div class="card" style="border-left:3px solid var(--accent);margin-bottom:14px">
      <div style="font-weight:800;font-size:15px;margin-bottom:4px">💶 资金地图 · 方向趋势与定位 <span class="muted" style="font-weight:500;font-size:12px">更新 ${esc(F.updated||'')}</span></div>
      <div style="font-size:13.5px;line-height:1.6">${esc(F.headline||'')}</div>
    </div>
    <div class="section-title">趋势 · 你在哪条曲线</div>
    ${trend}
    <div style="height:6px"></div>
    ${groups}
    <div class="muted" style="font-size:11.5px;margin-top:6px;padding:0 2px">契合分＝与你（模态语义 × LM × 认知）的对口度 /5；已按 2026-07 核实经费 + 在招信号标注。每个 PI 的经费也在「申请清单」卡片的『💶 资金』行。</div>`;
}
function renderPrograms(){
  const F=DATA.programs||{};
  const routeTag=r=>{ const m={program:['#3b82f6','统一/网络'],committee:['#b8350f','committee'],cluster:['#0f766e','集群'],pi:['#7c53c8','PI-direct']}[r]; return m?`<span class="tag" style="background:${m[0]}1f;color:${m[0]};font-size:10px">${m[1]}</span>`:''; };
  const groups=(F.groups||[]).map(g=>{
    const rows=(g.items||[]).map(it=>`<div class="lab-row" style="align-items:flex-start;gap:8px">
      <div style="min-width:170px;flex:none"><div style="font-weight:600;font-size:12.5px">${esc(it.n)}</div>${it.when?`<div class="muted" style="font-size:11px">${esc(it.when)}</div>`:''}${routeTag(it.route)}</div>
      <div class="muted" style="flex:1;min-width:0;font-size:12.5px;line-height:1.5">${esc(it.note||'')}</div></div>`).join('');
    return `<div class="section-title">${esc(g.g)}</div><div class="card" style="margin-bottom:12px">${rows}</div>`;
  }).join('');
  const mon=(F.monitor||[]).map(m=>`<li style="margin:2px 0">${esc(m)}</li>`).join('');
  $('#view-programs').innerHTML=`
    <div class="card" style="border-left:3px solid var(--accent);margin-bottom:14px">
      <div style="font-weight:800;font-size:15px;margin-bottom:4px">🧭 项目 / 入口 <span class="muted" style="font-weight:500;font-size:12px">更新 ${esc(F.updated||'')}</span></div>
      <div style="font-size:13px;line-height:1.6">${esc(F.note||'')}</div></div>
    ${groups}
    ${mon?`<div class="section-title">怎么盯(设一次就行)</div><div class="card"><ul style="margin:0;padding-left:18px;font-size:12.5px;color:var(--ink-soft)">${mon}</ul></div>`:''}`;
}
const views={today:renderToday,plan:renderPlan,skills:renderSkills,timeline:renderTimeline,targets:renderTargets,programs:renderPrograms,funding:renderFunding,gantt:renderGantt,tracks:renderTracks,projects:renderProjects,ideas:renderIdeas};
function show(v){ $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  $$('.view').forEach(s=>s.classList.toggle('active',s.id==='view-'+v));
  views[v](); location.hash=v; }
$$('#tabs .tab').forEach(t=>t.onclick=()=>show(t.dataset.v));

/* theme */
function applyTheme(t){ document.documentElement.dataset.theme=t; $('#themeBtn').textContent=t==='dark'?'浅色':'深色';
  localStorage.setItem('phddash.theme',t); }
$('#themeBtn').onclick=()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
applyTheme(localStorage.getItem('phddash.theme')|| 'light');

$('#resetBtn').onclick=()=>{ if(confirm('确定清空所有打勾进度？此操作不可撤销。')){ store={}; localStorage.removeItem(SKEY);
  refreshGlobals(); show(curView()); } };
function curView(){ return ($$('.tab.active')[0]||{dataset:{v:'today'}}).dataset.v; }

/* init / unlock gate */
function boot(){
  curIso = clampIso(isoToday());
  refreshGlobals();
  const _initial=(location.hash||'').slice(1);
  show(_initial in views ? _initial : 'today');
}
async function decryptData(pass){
  const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const baseKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},
    baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
const PKEY='phddash.pass';
async function tryUnlock(pass,fromCache){
  try{
    DATA=await decryptData(pass);
    if(document.getElementById('gateRemember')?.checked!==false) localStorage.setItem(PKEY,pass);
    const g=document.getElementById('gate'); if(g) g.remove();
    boot();
  }catch(e){
    if(fromCache){ localStorage.removeItem(PKEY); showGate(); }
    else { const er=document.getElementById('gateErr'); if(er) er.textContent='口令错误，请重试'; }
  }
}
function showGate(){
  if(document.getElementById('gate')) return;
  document.body.insertAdjacentHTML('beforeend',`
    <div id="gate" style="position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:var(--bg);padding:20px">
      <div class="card" style="max-width:360px;width:100%;text-align:center">
        <div style="width:44px;height:44px;border-radius:12px;margin:0 auto 4px;background:linear-gradient(135deg,var(--accent),var(--teal))"></div>
        <div style="font-weight:800;font-size:20px;margin:8px 0 2px">Xiaochuan Li OS</div>
        <div class="muted" style="font-size:13px;margin-bottom:14px">输入口令以解锁你的计划</div>
        <input id="gatePass" type="password" class="input" placeholder="口令" style="width:100%">
        <div id="gateErr" style="color:var(--red);min-height:18px;font-size:13px;margin:6px 0"></div>
        <button id="gateBtn" class="tab active" style="width:100%;border:none;cursor:pointer;justify-content:center">解锁</button>
        <label class="muted" style="display:flex;align-items:center;gap:6px;justify-content:center;margin-top:12px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="gateRemember" checked> 在此设备记住口令</label>
      </div>
    </div>`);
  const inp=document.getElementById('gatePass'), btn=document.getElementById('gateBtn');
  const go=()=>{ const v=inp.value.trim(); if(v) tryUnlock(v,false); };
  btn.onclick=go; inp.onkeydown=e=>{ if(e.key==='Enter') go(); };
  inp.focus();
}
if(DATA){ boot(); }
else if(ENC){ const c=localStorage.getItem(PKEY); if(c) tryUnlock(c,true); else showGate(); }
else { document.querySelector('main').innerHTML='<div class="card">数据缺失。</div>'; }
</script>
